<!DOCTYPE html>
<html dir="ltr" lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibaddie | Admin</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="./favicon.ico">
    <style>
        body.adm-body { display:block; overflow-y:auto; padding:20px 0 60px; align-items:flex-start; }
        .adm-card { max-width:900px; width:95%; margin:20px auto; padding:2rem; }
        .login-sec, .dash-sec { display:none; }
        .login-sec.active, .dash-sec.active { display:block; animation:fadeUp .4s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

        .back-btn { color:#a0a0b0; text-decoration:none; font-size:0.85rem; margin-bottom:1rem; display:inline-block; }
        .back-btn:hover { color:#fff; }

        .adm-form { display:flex; flex-direction:column; gap:12px; margin-bottom:1.5rem; }
        .adm-form input, .adm-form button { padding:13px 16px; border-radius:11px; border:1px solid rgba(255,255,255,0.12); font-family:'Outfit',sans-serif; font-size:0.92rem; }
        .adm-form input { background:rgba(0,0,0,0.4); color:#fff; }
        .adm-form input:focus { outline:none; border-color:rgba(142,197,252,0.5); }
        .adm-form button { background:linear-gradient(135deg,#FFD700,#FFA500); color:#000; font-weight:700; cursor:pointer; box-shadow:0 6px 16px rgba(255,165,0,0.25); }
        .adm-form button:hover { transform:translateY(-1px); }

        .pw-wrap { position:relative; }
        .pw-wrap input { width:100%; padding-right:45px; }
        .pw-toggle { position:absolute; right:14px; top:50%; margin-top:-10px; cursor:pointer; color:rgba(255,255,255,0.5); }
        .pw-toggle:hover { color:#fff; }

        /* Top bar */
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
        .online-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border-radius:30px; font-size:0.82rem; font-weight:600; background:rgba(76,175,80,0.12); border:1px solid rgba(76,175,80,0.35); color:#4CAF50; }
        .online-badge .dot { width:8px; height:8px; border-radius:50%; background:#4CAF50; box-shadow:0 0 6px #4CAF50; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .logout-btn { background:rgba(255,76,76,0.15); color:#ff4c4c; border:1px solid rgba(255,76,76,0.35); padding:6px 14px; border-radius:10px; cursor:pointer; font-size:0.82rem; font-family:'Outfit',sans-serif; font-weight:600; }
        .logout-btn:hover { background:rgba(255,76,76,0.25); }

        /* Pending panel */
        .panel { background:rgba(255,76,76,0.05); border:1px solid rgba(255,76,76,0.2); border-radius:14px; padding:16px; margin-bottom:1.5rem; }
        .panel-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .panel-title strong { color:#ff8888; font-size:0.95rem; }
        .count-badge { background:rgba(255,76,76,0.2); color:#ff4c4c; padding:3px 10px; border-radius:20px; font-size:0.78rem; font-weight:700; }

        .req-card { background:rgba(25,25,35,0.7); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; margin-bottom:10px; }
        .req-card:last-child { margin-bottom:0; }
        .req-info { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
        .req-info strong { color:#fff; font-size:0.9rem; }
        .req-info span { font-size:0.73rem; color:#808090; }
        .req-img { width:100%; max-width:350px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); margin-bottom:10px; cursor:pointer; }
        .req-btns { display:flex; gap:6px; flex-wrap:wrap; }
        .req-btn { padding:7px 14px; border-radius:8px; cursor:pointer; font-size:0.78rem; font-family:'Outfit',sans-serif; font-weight:600; border:1px solid; transition:all .15s; }
        .req-btn.approve { background:rgba(76,175,80,0.2); color:#4CAF50; border-color:rgba(76,175,80,0.4); }
        .req-btn.approve:hover { background:rgba(76,175,80,0.3); }
        .req-btn.reject { background:rgba(255,76,76,0.15); color:#ff4c4c; border-color:rgba(255,76,76,0.35); }
        .req-btn.reject:hover { background:rgba(255,76,76,0.25); }
        .req-btn.fresh { background:rgba(255,165,0,0.15); color:#FFA500; border-color:rgba(255,165,0,0.35); }
        .req-btn.fresh:hover { background:rgba(255,165,0,0.25); }

        /* Token table */
        .divider { border-top:1px solid rgba(255,255,255,0.08); margin:1.5rem 0 1rem; padding-top:1rem; }
        .divider h3 { color:#fff; margin:0 0 10px; font-size:1rem; }
        .refresh-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; padding:7px 14px; border-radius:9px; cursor:pointer; font-size:0.82rem; margin-bottom:12px; font-family:'Outfit',sans-serif; }
        .refresh-btn:hover { background:rgba(255,255,255,0.14); }
        .tbl-wrap { overflow-x:auto; border-radius:12px; border:1px solid rgba(255,255,255,0.08); }
        table { width:100%; border-collapse:collapse; background:rgba(0,0,0,0.3); font-size:0.85rem; }
        th, td { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.05); color:#d0d0d8; vertical-align:top; text-align:left; }
        th { background:rgba(255,255,255,0.05); color:#fff; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; }
        td strong { color:#fff; }
        .meta { font-size:0.72rem; color:#808090; }
        .act-btn { background:rgba(255,215,0,0.12); color:#FFD700; border:1px solid rgba(255,215,0,0.3); padding:5px 10px; border-radius:7px; cursor:pointer; font-size:0.75rem; margin:2px; font-family:'Outfit',sans-serif; font-weight:600; }
        .act-btn:hover { background:rgba(255,215,0,0.22); }
        .act-btn.danger { background:rgba(255,76,76,0.15); color:#ff4c4c; border-color:rgba(255,76,76,0.35); }
        .act-btn.danger:hover { background:rgba(255,76,76,0.25); }
        .act-btn.view { background:rgba(76,175,80,0.15); color:#4CAF50; border-color:rgba(76,175,80,0.35); }
        .act-btn.view:hover { background:rgba(76,175,80,0.25); }
        .copy-link { color:#FFD700; cursor:pointer; font-size:0.8rem; font-weight:600; border-bottom:1px dashed rgba(255,215,0,0.3); }
        .copy-link:hover { border-bottom-color:#FFD700; }
        #msg { color:#4CAF50; font-size:0.85rem; margin-bottom:10px; min-height:1.2em; }
        #err { color:#ff4c4c; font-size:0.85rem; margin-bottom:10px; min-height:1.2em; }
        @media(max-width:600px){ .adm-card{padding:1.2rem;} table{font-size:0.78rem;} th,td{padding:9px 8px;} .req-btn{font-size:0.72rem;padding:6px 10px;} }
    </style>
</head>
<body class="adm-body">
    <div class="background-anim"></div>
    <div class="container glassmorphism adm-card">
        <a href="index.html" class="back-btn">← Back</a>

        <!-- LOGIN -->
        <div id="loginSec" class="login-sec active">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <h1 class="gradient-text" style="font-size:2rem;">Ibaddie Vault</h1>
                <p style="color:#a0a0b0;font-size:0.9rem;">Code Request Management</p>
            </div>
            <p id="err"></p>
            <div class="adm-form">
                <div class="pw-wrap">
                    <input type="password" id="pw" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
                    <svg class="pw-toggle" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="togglePw()"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
                <button onclick="login()">Enter</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashSec" class="dash-sec">
            <div class="top-bar">
                <div class="online-badge"><span class="dot"></span> You are online to buyers</div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <p id="msg"></p>

            <!-- PENDING REQUESTS -->
            <div class="panel">
                <div class="panel-title">
                    <strong>🔔 Pending Code Requests</strong>
                    <span id="pCount" class="count-badge">0</span>
                </div>
                <div id="pList"><p style="color:#707080;font-size:0.82rem;text-align:center;padding:0.8rem 0;">No pending requests</p></div>
            </div>

            <!-- ADD ACCOUNT -->
            <div class="divider">
                <h3>Add Account</h3>
                <div class="adm-form">
                    <input type="text" id="nUser" placeholder="Buyer email (label)">
                    <input type="text" id="nMs" placeholder="MS Account Email">
                    <input type="text" id="nSecret" placeholder="TOTP Secret (Base32)">
                    <button onclick="addToken()">Generate Link</button>
                </div>
            </div>

            <!-- TOKENS -->
            <div class="divider">
                <h3>Accounts</h3>
                <button class="refresh-btn" onclick="fetchList()">Refresh</button>
                <div class="tbl-wrap">
                    <table>
                        <thead><tr><th>Buyer</th><th>MS Email</th><th>Link</th><th>Actions</th></tr></thead>
                        <tbody id="tbl"><tr><td colspan="4" style="text-align:center;">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/admin.js"></script>
</body>
</html>
