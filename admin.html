<!DOCTYPE html>
<html dir="ltr" lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Ibaddie | Admin Dashboard</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body.admin-body {
            overflow-y: auto !important;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        .admin-container {
            max-width: 800px;
            width: 95%;
            margin-top: 40px;
            margin-bottom: 40px;
            padding: 30px;
        }

        .login-section,
        .dashboard-section {
            display: none;
        }

        .login-section.active,
        .dashboard-section.active {
            display: block;
        }

        /* Forms */
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .admin-form input,
        .admin-form button {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: inherit;
            font-size: 1rem;
        }

        .admin-form input {
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }

        .admin-form button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .admin-form button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .admin-form button.danger {
            background: linear-gradient(135deg, #ff4c4c, #c00000);
            color: white;
        }

        /* Password and Back */
        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #ddd;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #fff;
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .password-container input {
            width: 100%;
            padding: 15px;
            padding-right: 45px;
            margin: 0;
            box-sizing: border-box;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            margin-top: -10px; /* svg is 20px tall, this perfectly centers it */
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: rgba(255, 255, 255, 1);
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-weight: bold;
        }

        .action-btn {
            background: rgba(255, 76, 76, 0.2);
            color: #ff4c4c;
            border: 1px solid rgba(255, 76, 76, 0.5);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 76, 76, 0.4);
        }

        .copy-link {
            color: #FFD700;
            text-decoration: none;
            cursor: pointer;
        }

        .copy-link:hover {
            text-decoration: underline;
        }

        #errorMsg,
        #dashboardMsg {
            color: #ff4c4c;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        #dashboardMsg,
        #successMsg {
            color: #4CAF50;
        }
    </style>
</head>

<body class="admin-body">
    <div class="background-anim"></div>

    <div class="container glassmorphism admin-container">

        <a href="index.html" class="back-btn">← Back to Main</a>

        <!-- LOGIN SECTION -->
        <div id="loginSection" class="login-section active">
            <div class="header-section">
                <h1 class="gradient-text">Admin Login</h1>
                <h2 class="subtitle">Secure Vault Access</h2>
            </div>

            <p id="errorMsg"></p>

            <div class="admin-form">
                <div class="password-container">
                    <input type="password" id="adminPassword" placeholder="Enter Master Password">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toggle-password" onclick="togglePassword()"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg id="eyeOffIcon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="toggle-password" onclick="togglePassword()"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </div>
                <button onclick="attemptLogin()">Enter Vault</button>
            </div>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dashboardSection" class="dashboard-section">
            <div class="header-section">
                <h1 class="gradient-text">Ibaddie Vault</h1>
                <h2 class="subtitle">Code Delivery Management</h2>
            </div>

            <p id="dashboardMsg"></p>

            <h3 style="color: white; margin-bottom: 10px;">Add New Account</h3>
            <div class="admin-form">
                <input type="text" id="newUsername" placeholder="Customer or Account Username">
                <input type="text" id="newSecret" placeholder="Microsoft Base32 Secret Key (e.g. JBSW...)">
                <button onclick="createToken()">Generate Delivery Link</button>
            </div>

            <h3 style="color: white; margin: 30px 0 10px 0;">Active Masterkeys</h3>
            <button onclick="fetchList()"
                style="margin-bottom:15px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:8px 12px; border-radius:8px; cursor:pointer;">Refresh
                List</button>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>User / Account</th>
                            <th>Uses Left</th>
                            <th>Delivery Link</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tokenTableBody">
                        <tr>
                            <td colspan="4" style="text-align:center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="./js/admin.js"></script>
</body>

</html>
