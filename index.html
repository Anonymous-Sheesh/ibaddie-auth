<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ibaddie | Redirecting...</title>
    <script>
        // Redirect old links (?token=xxx) to the new Code Request page
        var url = new URL(window.location.href);
        var token = url.searchParams.get('token') || url.searchParams.get('t');
        if (token) {
            window.location.href = './request.html?token=' + encodeURIComponent(token);
        } else {
            window.location.href = './request.html';
        }
    </script>
</head>
<body style="background:#050505;color:#888;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <p>Redirecting...</p>
</body>
</html>
